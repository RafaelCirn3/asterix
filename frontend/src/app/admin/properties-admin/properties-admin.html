<div class="admin-shell">
  <header>
    <a routerLink="/admin/dashboard">Asterix Admin</a>
    <nav>
      <a routerLink="/admin/imoveis">Imoveis</a>
      <a routerLink="/">Site</a>
      <button mat-button (click)="auth.logout()">Sair</button>
    </nav>
  </header>
  <main>
    <div class="admin-title">
      <h1>Imoveis</h1>
      <a mat-flat-button color="primary" routerLink="/admin/imoveis/novo">
        <mat-icon>add</mat-icon>
        Cadastrar
      </a>
    </div>

    <form [formGroup]="form" (ngSubmit)="load()" class="search-admin">
      <input formControlName="search" placeholder="Pesquisar por nome" />
      <button mat-stroked-button type="submit">Pesquisar</button>
    </form>

    <div class="admin-card table-wrap">
      <table mat-table [dataSource]="properties()">
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let item">{{ item.nome }}</td>
        </ng-container>
        <ng-container matColumnDef="localizacao">
          <th mat-header-cell *matHeaderCellDef>Localizacao</th>
          <td mat-cell *matCellDef="let item">{{ item.bairro }}, {{ item.cidade }}</td>
        </ng-container>
        <ng-container matColumnDef="preco">
          <th mat-header-cell *matHeaderCellDef>Preco</th>
          <td mat-cell *matCellDef="let item">{{ item.preco | currency: 'BRL' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let item">{{ item.status }}</td>
        </ng-container>
        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Acoes</th>
          <td mat-cell *matCellDef="let item">
            <a mat-icon-button [routerLink]="['/imoveis', item.id]" aria-label="Visualizar">
              <mat-icon>visibility</mat-icon>
            </a>
            <a mat-icon-button [routerLink]="['/admin/imoveis', item.id, 'editar']" aria-label="Editar">
              <mat-icon>edit</mat-icon>
            </a>
            <button mat-icon-button (click)="remove(item)" aria-label="Excluir">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </main>
</div>
