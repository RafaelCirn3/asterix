<main class="login-page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Asterix Admin</mat-card-title>
      <mat-card-subtitle>Acesso restrito ao painel imobiliario</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" type="password" />
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button color="primary" type="submit">Entrar</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/">Voltar ao site</a>
    </mat-card-actions>
  </mat-card>
</main>
